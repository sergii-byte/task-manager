<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent — Fligen Aircrafts Trading Ltd.</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="icon" href="favicon-32.png" type="image/png" sizes="32x32">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #FAFAF8;
      color: #1A1A18;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .logo { width: 64px; margin-bottom: 32px; opacity: 0.9; }
    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #0D503C;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 16px;
      color: #6B6B60;
      line-height: 1.7;
      max-width: 440px;
      margin-bottom: 32px;
    }
    a {
      display: inline-block;
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #FAFAF8;
      background: #0D503C;
      padding: 12px 28px;
      border-radius: 100px;
      text-decoration: none;
      transition: background 0.3s ease;
    }
    a:hover { background: #0a3f2f; }
  </style>
