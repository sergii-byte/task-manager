<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#6a1b9a">
<title>ordify</title>
<link rel="stylesheet" href="style.css?v=3">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
</head>
<body>

<aside id="sidebar">
    <div class="brand">ordify</div>
    <nav id="nav"></nav>
    <div class="sidebar-foot">
        <button id="settings-btn" title="Settings">⚙ Settings</button>
    </div>
</aside>

<main id="main">
    <header id="topbar">
        <div id="timer-strip" hidden>
            <span class="dot"></span>
            <span id="timer-label">—</span>
            <span id="timer-clock">00:00:00</span>
            <button id="timer-stop">stop</button>
        </div>
        <div id="omni">
            <input id="omni-input" type="text" autocomplete="off" spellcheck="false"
                   placeholder="Type or dictate — AI will figure it out  (⌘K)">
            <button id="omni-mic" title="Dictate (uk-UA / ru-RU)" aria-label="Voice input">🎤</button>
            <button id="omni-ai" title="Ask Claude (⌘+Enter)" aria-label="AI parse">✨</button>
        </div>
        <div id="omni-panel" hidden></div>
    </header>
    <div id="view"></div>
</main>

<dialog id="modal">
    <form id="modal-form" method="dialog">
        <header><h2 id="modal-title">Edit</h2><button type="button" class="close" id="modal-close">×</button></header>
        <div id="modal-body"></div>
        <footer>
            <button type="button" id="modal-delete" class="danger">Delete</button>
            <span class="grow"></span>
            <button type="button" id="modal-cancel">Cancel</button>
            <button type="submit" id="modal-save" class="primary">Save</button>
        </footer>
    </form>
</dialog>

<div id="toast" hidden></div>

<script src="app.js?v=3"></script>
<script src="omni.js?v=3"></script>
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW register failed', err));
    });
}
</script>
</body>
</html>
