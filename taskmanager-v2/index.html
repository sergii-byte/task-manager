<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ordify</title>
<link rel="stylesheet" href="style.css?v=2">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236a1b9a' stroke-width='2.5'%3E%3Crect x='3' y='3' width='18' height='18' rx='3'/%3E%3Cpath d='M7.5 9.5h9M7.5 13.5h6M7.5 17.5h3'/%3E%3C/svg%3E">
</head>
<body>

<aside id="sidebar">
    <div class="brand">ordify</div>
    <nav id="nav"></nav>
    <div class="sidebar-foot">
        <button id="settings-btn" title="Settings">⚙ Settings</button>
    </div>
</aside>

<main id="main">
    <header id="topbar">
        <div id="timer-strip" hidden>
            <span class="dot"></span>
            <span id="timer-label">—</span>
            <span id="timer-clock">00:00:00</span>
            <button id="timer-stop">stop</button>
        </div>
        <input id="search" type="text" placeholder="Search clients, matters, tasks…" autocomplete="off">
    </header>
    <div id="view"></div>
</main>

<dialog id="modal">
    <form id="modal-form" method="dialog">
        <header><h2 id="modal-title">Edit</h2><button type="button" class="close" id="modal-close">×</button></header>
        <div id="modal-body"></div>
        <footer>
            <button type="button" id="modal-delete" class="danger">Delete</button>
            <span class="grow"></span>
            <button type="button" id="modal-cancel">Cancel</button>
            <button type="submit" id="modal-save" class="primary">Save</button>
        </footer>
    </form>
</dialog>

<div id="toast" hidden></div>

<script src="app.js?v=2"></script>
</body>
</html>
